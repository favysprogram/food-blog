<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Contact</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>

<header class="container nav">
  <h1 class="logo">Foodieland</h1>
  <nav>
    <a href="index.html">Home</a>
    <a href="blog.html">Blog</a>
    <a href="#">Contact</a>
  </nav>
</header>

<!-- CONTACT SECTION -->
<section class="container contact section">
  
  <div class="contact-image">
    <img src="https://images.unsplash.com/photo-1581291518857-4e27b48ff24e">
  </div>

  <form class="contact-form">
    <h2>Contact us</h2>

    <input type="text" placeholder="Name">
    <input type="email" placeholder="Email">
    <input type="text" placeholder="Subject">
    <textarea placeholder="Message"></textarea>

    <button class="btn primary">Send Message</button>
  </form>

</section>

<!-- CTA -->
<section class="cta container">
  <h2>Deliciousness to your inbox</h2>
  <button class="btn primary">Subscribe</button>
</section>

<!-- RECIPE SUGGESTIONS -->
<section class="container section">
  <h2>Check out delicious recipes</h2>

  <div class="grid">
    <div class="card"><img src="https://via.placeholder.com/200"><p>Chicken</p></div>
    <div class="card"><img src="https://via.placeholder.com/200"><p>Soup</p></div>
    <div class="card"><img src="https://via.placeholder.com/200"><p>Dessert</p></div>
  </div>
</section>

</body>
</html>
